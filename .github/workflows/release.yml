name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main

      - name: Build release binary
        run: swift build -c release --disable-sandbox

      - name: Build MLX metallib
        run: ./scripts/build_mlx_metallib.sh release

      - name: Package
        run: |
          mkdir -p dist
          # `speech`/`speech-server` are the canonical names; `audio`/`audio-server`
          # are deprecated aliases produced by the same targets in Package.swift.
          cp .build/release/speech .build/release/speech-server dist/
          cp .build/release/audio .build/release/audio-server dist/
          cp .build/release/mlx.metallib dist/
          # Copy every SPM-generated resource bundle next to the binary.
          # KokoroTTS needs its own bundle for fr/pt/hi pronunciation dicts (#212);
          # MAGNeT/VoxCPM2/etc. need swift-transformers_Hub.bundle for tokenizer
          # downloads, and MagpieTTS ships baked speaker tables in its own bundle.
          # Globbing keeps future modules from silently shipping broken.
          cp -R .build/release/*.bundle dist/
          cd dist
          tar czf speech-macos-arm64.tar.gz speech speech-server audio audio-server mlx.metallib *.bundle

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/speech-macos-arm64.tar.gz

      # Mint a short-lived installation token for soniqo/homebrew-tap via the
      # `soniqo-release-bot` GitHub App. The token is auto-revoked when the job
      # ends and is scoped to Contents: write on the tap only. App credentials
      # live as repo secrets (RELEASE_BOT_APP_ID, RELEASE_BOT_PRIVATE_KEY).
      - name: Mint Homebrew tap token
        id: tap-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.RELEASE_BOT_APP_ID }}
          private-key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}
          owner: soniqo
          repositories: homebrew-tap

      - name: Update Homebrew tap
        env:
          HOMEBREW_TAP_TOKEN: ${{ steps.tap-token.outputs.token }}
        run: |
          SHA=$(shasum -a 256 dist/speech-macos-arm64.tar.gz | awk '{print $1}')
          TAG="${GITHUB_REF_NAME}"
          URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/speech-macos-arm64.tar.gz"

          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/soniqo/homebrew-tap.git" /tmp/homebrew-tap
          cd /tmp/homebrew-tap

          sed -i '' "s|url \".*\"|url \"${URL}\"|" Formula/speech.rb
          sed -i '' "s|sha256 \".*\"|sha256 \"${SHA}\"|" Formula/speech.rb

          git config user.name "soniqo-release-bot[bot]"
          git config user.email "soniqo-release-bot[bot]@users.noreply.github.com"
          git add Formula/speech.rb
          git diff --cached --quiet || git commit -m "speech: update to ${TAG}"
          git push origin main
