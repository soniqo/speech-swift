name: Daily Benchmarks

on:
  schedule:
    - cron: '30 3 * * *'
  workflow_dispatch:
    inputs:
      runner_labels:
        description: 'JSON array of runner labels'
        required: false
        default: '["self-hosted","macOS","ARM64"]'
      asr_limit:
        description: 'Max LibriSpeech utterances per ASR engine'
        required: false
        default: '200'
      asr_engines:
        description: 'Space-separated ASR engine IDs'
        required: false
        default: 'qwen3-mlx-0.6b-8bit qwen3-mlx-0.6b-4bit parakeet omnilingual-mlx-300m-4bit'
      publish_dashboard:
        description: 'Publish dashboard to gh-pages'
        required: false
        type: boolean
        default: true

concurrency:
  group: daily-benchmarks
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  asr:
    name: ASR benchmark
    runs-on: ${{ fromJSON(github.event.inputs.runner_labels || '["self-hosted","macOS","ARM64"]') }}
    timeout-minutes: 360
    env:
      ASR_LIMIT: ${{ github.event.inputs.asr_limit || '200' }}
      ASR_ENGINES: ${{ github.event.inputs.asr_engines || 'qwen3-mlx-0.6b-8bit qwen3-mlx-0.6b-4bit parakeet omnilingual-mlx-300m-4bit' }}
      BENCH_DATASET_ROOT: ${{ github.workspace }}/.benchmark-datasets
      HF_DOWNLOAD_STALL_TIMEOUT: '300'

    steps:
      - uses: actions/checkout@v5

      - name: Cache SwiftPM build
        uses: actions/cache@v5
        with:
          path: .build
          key: spm-bench-${{ runner.os }}-${{ hashFiles('Package.swift', 'Package.resolved') }}
          restore-keys: |
            spm-bench-${{ runner.os }}-
            spm-${{ runner.os }}-

      - name: Cache LibriSpeech test-clean
        uses: actions/cache@v5
        with:
          path: .benchmark-datasets
          key: librispeech-test-clean-v1

      - name: Build benchmark binary
        run: swift build -c release --disable-sandbox --product asr-bench

      - name: Build MLX metallib
        run: ./scripts/build_mlx_metallib.sh release

      - name: Download LibriSpeech test-clean
        run: |
          set -euo pipefail
          mkdir -p "$BENCH_DATASET_ROOT"
          if [ ! -d "$BENCH_DATASET_ROOT/LibriSpeech/test-clean" ]; then
            curl --fail --location --retry 5 --retry-delay 10 \
              https://www.openslr.org/resources/12/test-clean.tar.gz \
              | tar -xz -C "$BENCH_DATASET_ROOT"
          fi

      - name: Run ASR benchmark
        run: |
          set -euo pipefail
          RUN_KEY="$(date -u +%Y%m%dT%H%M%SZ)-${GITHUB_SHA:0:7}"
          RUN_DIR="benchmark-results/runs/$RUN_KEY"
          mkdir -p "$RUN_DIR"

          read -r -a ENGINE_ARGS <<< "$ASR_ENGINES"
          .build/release/asr-bench \
            --dataset "$BENCH_DATASET_ROOT/LibriSpeech/test-clean" \
            --limit "$ASR_LIMIT" \
            --engines "${ENGINE_ARGS[@]}" \
            --isolated \
            --output "$RUN_DIR/asr.json"

          python3 - "$RUN_DIR/metadata.json" <<'PY'
          import json
          import os
          import platform
          import subprocess
          import sys
          from datetime import datetime, timezone

          def cmd(*args):
              try:
                  return subprocess.check_output(args, text=True).strip()
              except Exception:
                  return ""

          metadata = {
              "run_id": os.environ.get("GITHUB_RUN_ID", ""),
              "run_attempt": os.environ.get("GITHUB_RUN_ATTEMPT", ""),
              "started_at": datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ"),
              "workflow": os.environ.get("GITHUB_WORKFLOW", ""),
              "event": os.environ.get("GITHUB_EVENT_NAME", ""),
              "git": {
                  "sha": os.environ.get("GITHUB_SHA", ""),
                  "short_sha": os.environ.get("GITHUB_SHA", "")[:7],
                  "ref": os.environ.get("GITHUB_REF", ""),
                  "branch": os.environ.get("GITHUB_REF_NAME", ""),
              },
              "runner": {
                  "name": os.environ.get("RUNNER_NAME", ""),
                  "os": os.environ.get("RUNNER_OS", ""),
                  "arch": os.environ.get("RUNNER_ARCH", ""),
                  "host": platform.node(),
                  "cpu": cmd("sysctl", "-n", "machdep.cpu.brand_string"),
                  "macos": cmd("sw_vers", "-productVersion"),
              },
              "config": {
                  "dataset": "LibriSpeech test-clean",
                  "asr_limit": os.environ.get("ASR_LIMIT", ""),
                  "asr_engines": os.environ.get("ASR_ENGINES", "").split(),
              },
          }

          with open(sys.argv[1], "w", encoding="utf-8") as f:
              json.dump(metadata, f, indent=2, sort_keys=True)
              f.write("\n")
          PY

      - name: Render dashboard artifact
        run: |
          python3 scripts/render_benchmark_dashboard.py \
            --runs-dir benchmark-results/runs \
            --output benchmark-results/index.html \
            --summary "$GITHUB_STEP_SUMMARY"

      - name: Upload benchmark artifact
        uses: actions/upload-artifact@v5
        with:
          name: benchmark-results-${{ github.run_id }}
          path: benchmark-results

      - name: Publish dashboard
        if: github.event.inputs.publish_dashboard != 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          SITE_DIR="$(mktemp -d)"
          REMOTE="https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          if git ls-remote --exit-code --heads "$REMOTE" gh-pages >/dev/null 2>&1; then
            git clone --depth 1 --branch gh-pages "$REMOTE" "$SITE_DIR"
          else
            git init "$SITE_DIR"
            git -C "$SITE_DIR" checkout --orphan gh-pages
            git -C "$SITE_DIR" remote add origin "$REMOTE"
          fi

          mkdir -p "$SITE_DIR/benchmarks/data/runs"
          cp -R benchmark-results/runs/. "$SITE_DIR/benchmarks/data/runs/"

          python3 scripts/render_benchmark_dashboard.py \
            --runs-dir "$SITE_DIR/benchmarks/data/runs" \
            --output "$SITE_DIR/benchmarks/index.html" \
            --prune 90

          touch "$SITE_DIR/.nojekyll"
          git -C "$SITE_DIR" config user.name "github-actions[bot]"
          git -C "$SITE_DIR" config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C "$SITE_DIR" add .nojekyll benchmarks

          if git -C "$SITE_DIR" diff --cached --quiet; then
            echo "Dashboard already up to date"
          else
            git -C "$SITE_DIR" commit -m "Update benchmark dashboard"
            git -C "$SITE_DIR" push origin gh-pages
          fi
