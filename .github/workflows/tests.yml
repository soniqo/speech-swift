name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: macos-15
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Cache SwiftPM
        uses: actions/cache@v4
        with:
          path: .build
          key: spm-${{ runner.os }}-${{ hashFiles('Package.swift') }}
          restore-keys: spm-${{ runner.os }}-

      - name: Build debug
        run: swift build --build-tests --disable-sandbox 2>&1 | tail -5

      - name: Build metallib
        run: ./scripts/build_mlx_metallib.sh debug

      - name: Copy metallib to test bundle
        run: |
          ARCH="$(uname -m)-apple-macosx"
          for BUNDLE in .build/$ARCH/debug/*.xctest/Contents/MacOS; do
            [ -d "$BUNDLE" ] && cp .build/debug/mlx.metallib "$BUNDLE/" 2>/dev/null || true
          done

      - name: Run unit tests
        run: >
          swift test --skip-build
          --skip Qwen3ChatE2ETests
          --skip Qwen3ASRIntegrationTests
          --skip ParakeetASRE2ETests
          --skip KokoroE2ETests
          --skip Qwen3TTSE2ETests
          --skip PersonaPlexE2ETests
          --skip CosyVoiceE2ETests
