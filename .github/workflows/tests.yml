name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: macos-15
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Cache SwiftPM
        uses: actions/cache@v4
        with:
          path: .build
          key: spm-${{ runner.os }}-${{ hashFiles('Package.swift') }}
          restore-keys: spm-${{ runner.os }}-

      - name: Build debug
        run: swift build --build-tests --disable-sandbox

      - name: Build metallib
        run: ./scripts/build_mlx_metallib.sh debug

      - name: Copy metallib to test bundle
        run: |
          ARCH="$(uname -m)-apple-macosx"
          for BUNDLE in .build/$ARCH/debug/*.xctest/Contents/MacOS; do
            [ -d "$BUNDLE" ] && cp .build/debug/mlx.metallib "$BUNDLE/" 2>/dev/null || true
          done

      - name: Run unit tests (skip E2E — those require model downloads)
        run: >
          swift test --skip-build
          --skip E2E
          --skip StreamingASRTests
          --skip ForcedAlignerTests
          --skip SileroVADTests
          --skip SpeechVADTests
          --skip WeSpeakerTests
          --skip SortformerTests
          --skip SpeechEnhancementTests
          --skip PersonaPlexTests
          --skip ParakeetASRTests
          --skip CosyVoiceTTSTests
          --skip KokoroTTSTests
          --skip StreamingAudioPlayerTests

      - name: Build demo apps (release only)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          for demo in Examples/SpeechDemo Examples/PersonaPlexDemo; do
            echo "Building $demo..."
            (cd "$demo" && swift build --disable-sandbox) || exit 1
          done

  homebrew-lint:
    runs-on: macos-15
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up scratch tap
        # brew audit/style refuse to operate on a loose file path; they
        # insist the formula live in a tap. Create a scratch tap and
        # copy the formula into it (symlinks get resolved back to the
        # workspace path during audit parsing, which brew rejects as
        # "formula not in a tap").
        run: |
          TAP_DIR="$(brew --repository)/Library/Taps/speech-swift-ci/homebrew-local"
          mkdir -p "$TAP_DIR/Formula"
          cp "$GITHUB_WORKSPACE/Formula/speech.rb" "$TAP_DIR/Formula/speech.rb"
          echo "TAP_DIR=$TAP_DIR" >> "$GITHUB_ENV"

      - name: brew style
        run: brew style speech-swift-ci/local/speech

      - name: brew audit (lint only — offline, no URL fetch)
        # --strict catches the nits brew's maintainers flag for tap formulae;
        # --new-formula would gate on extra Homebrew-core requirements that
        # don't apply to our tap, so we skip it.
        run: brew audit --strict --tap=speech-swift-ci/local speech
