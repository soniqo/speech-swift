name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: macos-15
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Cache SwiftPM
        uses: actions/cache@v4
        with:
          path: .build
          key: spm-${{ runner.os }}-${{ hashFiles('Package.swift') }}
          restore-keys: spm-${{ runner.os }}-

      - name: Build and run tests
        run: |
          swift build --build-tests --disable-sandbox
          ./scripts/build_mlx_metallib.sh debug
          ARCH="$(uname -m)-apple-macosx"
          for BUNDLE in .build/$ARCH/debug/*.xctest/Contents/MacOS; do
            [ -d "$BUNDLE" ] && cp .build/debug/mlx.metallib "$BUNDLE/" 2>/dev/null || true
          done
          swift test --skip-build \
            --skip E2ETests \
            --skip IntegrationTests
